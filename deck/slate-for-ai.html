    try { sessionStorage.removeItem("sfa_pw"); } catch (e2) {}
    if (!silent) {
      msg.textContent = "비밀번호가 틀렸습니다 — 다른 테이크로 다시.";
      var c = document.getElementById("card"); c.classList.remove("shake"); void c.offsetWidth; c.classList.add("shake");
      var inp = document.getElementById("pw"); inp.value = ""; inp.focus();
    }
  }
}
document.getElementById("f").addEventListener("submit", function (ev) { ev.preventDefault(); var v = document.getElementById("pw").value; if (v) go(v, false); });
(function () { try { var saved = sessionStorage.getItem("sfa_pw"); if (saved) go(saved, true); } catch (e) {} })();
